name: 🐛 バグ報告
description: バグを報告する
title: '[Bug]: '
labels: ['bug']

body:
  - type: markdown
    attributes:
      value: |
        バグ報告ありがとうございます。以下の情報を記入してください。

  - type: input
    id: extension-version
    attributes:
      label: Extension version
      placeholder: 0.1.0
    validations:
      required: true

  - type: input
    id: vscode-version
    attributes:
      label: VSCode version
      placeholder: 1.109.0
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS version
      placeholder: Windows 10
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 再現手順
      description: バグを再現するための手順を記述してください
      value: |
        1. 
        2. 
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期待される動作
      description: 本来どうなるべきだったか
    validations:
      required: true
